# Simulation Specific Configuration (VCS)
# Only VCS is supported at the moment
SIM_SETUP:
    SIMULATOR: vcs          # choose your simulator (only VCS is supported...)
    STAGE: behav            # simulation stage: behav | syn | apr
    TESTBENCH: tb_dsu_air_top
    TOPLEVEL: dsu_air_top

# RTL Module Parameters
# RTL_PARAMS:
    # DATA_WIDTH: 14
    # TRIG_WIDTH: 2
    # WORD_FACTOR: 3
    # MEM_DEPTH: 64

# Define the simulation environment variables
SIM_ENV:
    SYNOPSYS_HOME: /tools/software/synopsys # synopsys path
    VCS_HOME: /tools/software/vcs           # vcs path
    PRJ_DIR: ../..                          # project root directory
    SRC_RTL: ../../src/rtl
    SRC_VERIF: ../../src/verif
    SRC_SCAN: ../../src/scan

# Define build arguments for VCS
BUILD_ARGS:
    - "-sverilog"                   # systemverilog support
    - "-full64"                     # 64-bit mode (required for large designs)
    - "+v2k"                        # verilog-2001 support
    - "-debug_access+all"           # full debug visibility (higher visibility results in longer sim times)
    - "-debug_region+cell+encrypt"  # debug encrypted modules and cells
    - "-kdb"                        # knowledge database for Verdi
    - "+lint=all"                   # enable all lint warnings
    - "-timescale=1ns/1ps"          # set default timescale (use this instead of the runner's timescale argument)
    # - "-lca"                        # unlocks BETA features

# +defines for your VCS simulation
VERILOG_DEFINES:
    "DEBUG": 1
    "FSDB": 0
    "VCD": 1
    "COCOTB_SIM": 1

# plusargs for your VCS simulation (haven't used in cocotb yet)
# SIM_PLUSARGS:
#     testname: base_test
#     numtests: 1

